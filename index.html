<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionian Pronunciation Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
        }
        .ipa-badge {
            font-family: 'Courier New', Courier, monospace;
            background-color: #e6f7ff;
            color: #1a5695;
            border: 1px solid #bae7ff;
        }
        .tab-active {
            border-bottom: 4px solid #1a5695;
            color: #1a5695;
            font-weight: bold;
        }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-[#1a5695] text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">Parlar Ioniano</h1>
            <a href="https://alessio2002.github.io/LinguApp-main-menu/" class="text-sm bg-white/20 hover:bg-white/30 px-4 p-2 rounded-full font-semibold transition">
                &larr; Retorna al Menu
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-[#1a5695] mb-2">Manuale di Pronunzzia</h2>
            <p class="text-gray-600">Phonetics, letter values, and phonotactic rules of Standard Ionian</p>
        </div>

        <div class="flex border-b border-gray-200 mb-8 justify-center text-lg">
            <button id="tab-alphabet" class="px-6 py-3 tab-active transition focus:outline-none">
                Alfabeto (Single Letters)
            </button>
            <button id="tab-digraphs" class="px-6 py-3 text-gray-500 hover:text-[#1a5695] transition focus:outline-none">
                Digraphs & Clusters
            </button>
        </div>

        <div id="alphabet-view" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>

        <div id="digraphs-view" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            </div>
    </main>

    <script src="pronunciation.js"></script>
</body>
</html>
